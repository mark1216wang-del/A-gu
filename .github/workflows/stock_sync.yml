name: Auto Stock Sync

on:
  schedule:
    - cron: '30 7 * * 1-5' # 北京时间周一至周五 15:30 运行
  workflow_dispatch:      # 允许手动触发（手机端 GitHub App 可点）

jobs:
  build_and_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install akshare requests

      - name: Run analysis
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python stock_report.py

      - name: Commit and Push to Obsidian Repo
        run: |
          git config --global user.name "StockBot"
          git config --global user.email "bot@github.com"
          git add Stocks/*.md
          git commit -m "Auto-update stock report: $(date +'%Y-%m-%d')" || exit 0
          git push
