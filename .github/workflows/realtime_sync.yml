name: Realtime Stock Push

on:
  workflow_dispatch:      # 必须保留！这让你能在 GitHub 手机 App 上点击运行
  schedule:
    - cron: '0 2,6 * * 1-5' # 可选：每天早盘 10:00 和午盘 14:00 自动推两次

jobs:
  run_realtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install akshare requests

      - name: Fetch and Push
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python realtime_stock.py

      - name: Save to Repo
        run: |
          git config --global user.name "RealtimeBot"
          git config --global user.email "bot@github.com"
          git add Realtime_Logs/*.md
          git commit -m "Realtime Snapshot: $(date +'%H:%M:%S')" || exit 0
          git push
